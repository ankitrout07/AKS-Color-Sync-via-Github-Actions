apiVersion: apps/v1
kind: Deployment
metadata:
  name: color-sync
  labels:
    app: color-sync
spec:
  replicas: 2
  selector:
    matchLabels:
      app: color-sync
  template:
    metadata:
      labels:
        app: color-sync
    spec:
      containers:
      - name: color-sync-web
        # This tag will be updated by your GitHub Action
        image: acrcolorsync.azurecr.io/color-sync:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"