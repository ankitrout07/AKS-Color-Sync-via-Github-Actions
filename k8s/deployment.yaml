apiVersion: apps/v1
kind: Deployment
metadata:
  name: color-sync
  namespace: color-sync
  labels:
    app: color-sync
spec:
  replicas: 2
  selector:
    matchLabels:
      app: color-sync
  template:
    metadata:
      labels:
        app: color-sync
    spec:
      containers:
      - name: color-sync
        image: /color-sync:latest
        ports:
        - containerPort: 3000
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
env:
  - name: K8S_NAMESPACE
    valueFrom:
      fieldRef:
        fieldPath: metadata.namespace
containers:
- name: color-sync
  image: /color-sync:latest
  env:
    - name: NAMESPACE
      valueFrom:
        fieldRef:
          fieldPath: metadata.namespace