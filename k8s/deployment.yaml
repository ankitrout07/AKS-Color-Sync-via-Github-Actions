apiVersion: apps/v1
kind: Deployment
metadata:
  name: color-sync
  labels:
    app: color-sync
spec:
  replicas: 2
  selector:
    matchLabels:
      app: color-sync
  template:
    metadata:
      labels:
        app: color-sync
    spec:
      containers:
      - name: color-sync
        image: acrcolorsyncankit2026.azurecr.io/color-sync:latest
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
