apiVersion: apps/v1
kind: Deployment
metadata:
  name: color-sync
spec:
  replicas: 2
  selector:
    matchLabels:
      app: color-sync
  template:
    metadata:
      labels:
        app: color-sync
    spec:
      containers:
      - name: web
        image: acrcolorsyncankit2026.azurecr.io/color-sync:latest
        ports:
        - containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: color-sync-service
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8081
  selector:
    app: color-sync